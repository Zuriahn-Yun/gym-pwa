name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Syntax check all JS files
        run: |
          echo "Checking JavaScript syntax..."
          FAILED=0
          while IFS= read -r f; do
            if node --check "$f" 2>/dev/null; then
              echo "  ✓ $f"
            else
              node --check "$f"
              FAILED=1
            fi
          done < <(find . -name "*.js" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")
          if [ "$FAILED" -eq 1 ]; then
            echo "Syntax errors found!"
            exit 1
          fi
          echo "All syntax checks passed!"

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build SDK bundle
        run: npm run build
      - name: Start server and run smoke test
        run: |
          npm start &
          # Wait for server to start
          for i in {1..10}; do
            curl -s http://localhost:3000 > /dev/null && break
            echo "Waiting for server..."
            sleep 2
          done
          node screenshot-test.js
