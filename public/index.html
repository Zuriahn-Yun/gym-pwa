<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e85d04">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <title>Gym Tracker</title>
</head>
<body>
  <div id="app"></div>
  <nav id="bottom-nav" style="display:none;">
    <button class="nav-btn" data-route="today">
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" data-route="templates">
      <span class="nav-label">Templates</span>
    </button>
    <button class="nav-btn" data-route="history">
      <span class="nav-label">History</span>
    </button>
    <button class="nav-btn" data-route="profile">
      <span class="nav-label">Profile</span>
    </button>
    <button class="nav-btn" id="logout-btn" onclick="window.__logout()">
      <span class="nav-label">Sign Out</span>
    </button>
  </nav>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
